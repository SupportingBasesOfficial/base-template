# Supabase CLI config — 100% Cloud Workflow
# Sem Docker local. Sem supabase start. Apenas migrations e type sync.
# Comandos cloud: npx supabase db push, npx supabase gen types

project_id = "base-template"

[db.migrations]
enabled = true
schema_paths = []

[api]
enabled = true
max_rows = 1000

[auth]
enabled = true
enable_signup = true
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = true

[auth.rate_limit]
email_sent = 2
sign_in_sign_ups = 30

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[realtime]
enabled = true

[edge_runtime]
enabled = true
